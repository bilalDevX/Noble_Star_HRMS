services:
  - type: web
    name: noble-star-hrms
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn noble_star_hrms.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false